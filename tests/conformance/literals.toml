[[cases]]
name = "lit_out_float_neg0_0"
note = "negative zero float normalizes to 0 (float parity fix)"
source = "---\nparams: []\n---\n{{ -0.0 }}"
params = {}
expect = { kind = "render", output = "0" }

[[cases]]
name = "lit_out_int_neg0"
note = "negative zero int normalizes to 0"
