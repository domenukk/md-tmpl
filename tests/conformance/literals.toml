[[cases]]
name = "lit_if_int_truthy"
note = "non-zero int literal is truthy in an if condition"
source = "---\nparams: []\n---\n> {% if 42 %}\n\nYES\n\n> {% else %}\n\nNO\n\n> {% /if %}\n"
params = {}
expect = { kind = "render", output = "YES\n" }

[[cases]]
name = "lit_if_int_zero_falsey"
note = "zero int literal is falsey in an if condition"
source = "---\nparams: []\n---\n> {% if 0 %}\n\nYES\n\n> {% else %}\n\nNO\n\n> {% /if %}\n"
params = {}
expect = { kind = "render", output = "NO\n" }

[[cases]]
name = "lit_cmp_rhs_int"
note = "int literal on the RHS of == matches its output value"
source = "---\nparams:\n  - n = int\n---\n> {% if n == 42 %}\n\nEQ\n\n> {% else %}\n\nNE\n\n> {% /if %}\n"
params = { n = 42 }
expect = { kind = "render", output = "EQ\n" }

[[cases]]
name = "lit_cmp_lhs_int"
note = "int literal on the LHS of == matches its output value"
source = "---\nparams:\n  - n = int\n---\n> {% if 42 == n %}\n\nEQ\n\n> {% else %}\n\nNE\n\n> {% /if %}\n"
params = { n = 42 }
expect = { kind = "render", output = "EQ\n" }

