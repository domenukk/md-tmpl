# Shared conformance corpus — D5: literals & variables are consistent across
# every general expression position (output, filter, panic, interpolation) and
# behave identically to a variable of the same type. Also pins exact numeric
# formatting (incl. -0.0 -> 0) and phase-agnostic errors for malformed literals.
#
# Every value below was derived by executing the current Rust and TypeScript
# builds; the two backends agreed on all render outputs. Malformed-numeric and
# value-type-check cases use phase = "any" because the error legitimately trips
# at compile in Rust but at render in TS.

[[cases]]
name = "lit_out_int_42"
note = "int literal in output position renders like an int value"
source = "---\nparams: []\n---\n{{ 42 }}"
params = {}
expect = { kind = "render", output = "42" }

[[cases]]
name = "lit_out_int_neg7"
note = "negative int literal"
source = "---\nparams: []\n---\n{{ -7 }}"
params = {}
expect = { kind = "render", output = "-7" }

[[cases]]
name = "lit_out_int_0"
note = "zero int literal"
source = "---\nparams: []\n---\n{{ 0 }}"
params = {}
expect = { kind = "render", output = "0" }

