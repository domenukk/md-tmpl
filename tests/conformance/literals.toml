[[cases]]
name = "lit_panic_str_interp"
note = "panic string interpolates an int literal"
source = "---\nparams: []\n---\n> {% panic(\"boom {{ 42 }}\") %}\n"
params = {}
expect = { kind = "error", phase = "render", error_contains = "template panic: boom 42" }

[[cases]]
name = "lit_panic_int"
note = "panic accepts a bare int literal"
source = "---\nparams: []\n---\n> {% panic(42) %}\n"
params = {}
expect = { kind = "error", phase = "render", error_contains = "template panic: 42" }

[[cases]]
name = "lit_panic_bool"
