# ---------------------------------------------------------------------------
# Imports in included files
# ---------------------------------------------------------------------------
# When template A {% include %}s template B, template B can have its own
# imports: block in frontmatter. Those imports are resolved relative to
# template B's directory, enabling included files to use strongly typed
# enum params, imported consts, and match/case from imported types.

[[tests]]
name = "included_file_with_own_imports_enum_param"
description = "An included file can import a type-definition file and use its enum type for params"
parent_template = '''
---
params: [role = str]
---
> {% include [child](./child.tmpl.md) with role=role %}'''
expected_output = "Role: admin"

[tests.params]
role = "admin"

[tests.files]
"types.tmpl.md" = '''
---
name: types
types: [Role = enum(admin, editor, viewer)]
---
'''
"child.tmpl.md" = '''
---
imports:
  - "[types](./types.tmpl.md)"

params: [role = types.Role]
---
Role: {{ role }}'''

[[tests]]
name = "included_file_with_imports_match_case"
description = "An included file can import enum types and use match/case dispatch on them"
parent_template = '''
---
params: [severity = str]
---
> {% include [alert](./alert.tmpl.md) with severity=severity %}'''
expected_output = "🔴 Critical!\n"

[tests.params]
severity = "Critical"

[tests.files]
"severity_types.tmpl.md" = '''
---
name: severity_types
types: [Severity = enum(Critical, High, Low)]
---
'''
"alert.tmpl.md" = '''
---
imports:
  - "[severity_types](./severity_types.tmpl.md)"

params: [severity = severity_types.Severity]
---

> {% match severity %}
> {% case Critical %}

🔴 Critical!

> {% case High %}

🟠 High

> {% case Low %}

🟢 Low

> {% /match %}'''

[[tests]]
name = "included_file_with_imports_consts"
description = "An included file can import a template and use its exported constants"
parent_template = '''
