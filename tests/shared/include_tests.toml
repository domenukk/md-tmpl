name = "import_path_interpolation_invalid_prefix_error"
description = "Import path after interpolation must start with valid prefix"
parent_template = '''
---
consts: [DIR = str := "sub"]
imports:
  - [role]({{ consts.DIR }}/role.tmpl.md)
---
Hello'''
expected_error = "must start with"
files = {}
