[tests.files]
"lib.tmpl.md" = '''
---
name: lib
allow_unused: true

types:
  - TypeA = enum(TypeA, TypeB)
  - TypeC = enum(TypeC, TypeD)

consts:
  - CONST_X = str := "x"
  - CONST_Y = str := "y"
