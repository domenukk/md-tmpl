# -- Tier 1: Basic interpolation in conditions --

[[tests]]
name = "str_interp_if_eq_match"
description = "Interpolated string in == comparison matches when values align"
template = '''
---
params: [role = str, env = str]
---
> {% if role == "admin_{{ env }}" %}yes{% else %}no{% /if %}'''
expected_output = "yes"
[tests.params]
role = "admin_prod"
env = "prod"

[[tests]]
name = "str_interp_if_eq_no_match"
description = "Interpolated string in == comparison does not match when values differ"
template = '''
---
params: [role = str, env = str]
---
> {% if role == "admin_{{ env }}" %}yes{% else %}no{% /if %}'''
expected_output = "no"
[tests.params]
role = "admin_staging"
env = "prod"

[[tests]]
name = "str_interp_if_ne"
description = "Interpolated string with != operator"
template = '''
---
params: [label = str, prefix = str]
---
> {% if label != "{{ prefix }}_item" %}diff{% else %}same{% /if %}'''
expected_output = "same"
[tests.params]
label = "test_item"
prefix = "test"

[[tests]]
name = "str_interp_multiple_exprs"
description = "String literal with multiple {{ expr }} interpolations"
template = '''
---
params: [greeting = str, first = str, last = str]
---
> {% if greeting == "{{ first }} {{ last }}" %}match{% else %}no{% /if %}'''
expected_output = "match"
[tests.params]
greeting = "Jane Doe"
first = "Jane"
last = "Doe"

[[tests]]
name = "str_interp_in_operator"
description = "Interpolated string used as left operand of 'in'"
template = '''
---
params: [items = list(str), key = str]
---
> {% if "item_{{ key }}" in items %}found{% else %}missing{% /if %}'''
expected_output = "found"
[tests.params]
items = ["item_alpha", "item_beta"]
key = "alpha"

[[tests]]
name = "str_interp_in_operator_not_found"
description = "Interpolated string not found via 'in' operator"
template = '''
---
params: [items = list(str), key = str]
---
> {% if "item_{{ key }}" in items %}found{% else %}missing{% /if %}'''
expected_output = "missing"
[tests.params]
items = ["item_alpha", "item_beta"]
key = "gamma"

