recipient = "user@example.com"

[[tests]]
name = "f_t4_email_notification_executive_tier"
description = "Real-World S4: Multi-recipient email with executive tier omits unsub link"
template = '''
---
params:
  - recipient = str
  - tiers = list(str) := ["general", "updates"]
---
To: {{ recipient }}
> {% if "executive" in tiers %}[CONFIDENTIAL EXECUTIVE SUMMARY]{% elif "general" in tiers %}Standard Newsletter Updates{% /if %}
> {% if !("no_unsub" in tiers) %}[Unsubscribe Link]{% /if %}'''
expected_output = '''
To: exec@example.com
[CONFIDENTIAL EXECUTIVE SUMMARY]'''
