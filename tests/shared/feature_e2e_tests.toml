# Shared Feature E2E Tests (Milestone E2E.2)
# Covers:
# F1: List parameter default values ([...])
# F2: in operator (list membership & string substring)
# F3: Syntax error diagnostics (line, column, snippet)
# F4: {% panic(...) %} statement
# F5: Boolean expressions (&&, ||, !, (), match-as-condition, match guards)
#
# Structured across Tier 1 (Basic Functionality), Tier 2 (Edge Cases & BVA),
# Tier 3 (Pairwise Coverage), and Tier 4 (Real-World Application Scenarios).

# ============================================================================
# Tier 1: Basic Functionality — F1 List Parameter Default Values
# ============================================================================

[[tests]]
name = "f1_t1_list_str_default_used"
description = "List parameter with string defaults uses default values when not overridden"
template = '''
---
params: [items = list(str) := ["alpha", "beta"]]
---
> {% for x in items %}{{ x }} {% /for %}'''
expected_output = "alpha beta "
params = {}

[[tests]]
name = "f1_t1_list_str_default_overridden"
description = "List parameter with string defaults can be overridden by caller"
template = '''
---
params: [items = list(str) := ["alpha", "beta"]]
---
> {% for x in items %}{{ x }} {% /for %}'''
expected_output = "one two three "
[tests.params]
items = ["one", "two", "three"]

[[tests]]
name = "f1_t1_list_int_default_used"
description = "List parameter with integer defaults uses default values when not overridden"
template = '''
---
params: [nums = list(int) := [10, 20, 30]]
---
> {% for n in nums %}{{ n }}-{% /for %}'''
expected_output = "10-20-30-"
params = {}

[[tests]]
name = "f1_t1_list_int_default_overridden"
description = "List parameter with integer defaults can be overridden by caller"
template = '''
---
params: [nums = list(int) := [10, 20, 30]]
---
> {% for n in nums %}{{ n }}-{% /for %}'''
expected_output = "99-100-"
[tests.params]
nums = [99, 100]

[[tests]]
name = "f1_t1_list_bool_default_used"
description = "List parameter with boolean defaults uses default values when not overridden"
template = '''
---
params: [flags = list(bool) := [true, false, true]]
---
> {% for f in flags %}{% if f %}T{% else %}F{% /if %}{% /for %}'''
expected_output = "TFT"
params = {}

# ============================================================================
# Tier 2: Edge Cases & BVA — F1 List Parameter Default Values
# ============================================================================

[[tests]]
name = "f1_t2_empty_list_default_used"
description = "List parameter with empty list default uses empty list when not overridden"
template = '''
---
params: [items = list(str) := []]
---
> {% for x in items %}{{ x }}{% else %}empty_list{% /for %}'''
expected_output = "empty_list"
params = {}

[[tests]]
name = "f1_t2_empty_list_default_overridden_with_nonempty"
description = "List parameter with empty list default can be overridden with non-empty list"
template = '''
---
params: [items = list(str) := []]
---
> {% for x in items %}{{ x }} {% else %}empty_list{% /for %}'''
expected_output = "hello world "
[tests.params]
items = ["hello", "world"]

[[tests]]
name = "f1_t2_nonempty_default_overridden_with_empty"
description = "List parameter with non-empty default can be overridden with empty list"
template = '''
---
params: [items = list(str) := ["default", "values"]]
---
> {% for x in items %}{{ x }}{% else %}now_empty{% /for %}'''
expected_output = "now_empty"
[tests.params]
items = []

[[tests]]
name = "f1_t2_list_default_single_element"
description = "List parameter with single element default works correctly"
template = '''
---
params: [items = list(str) := ["single"]]
---
> {% for x in items %}[{{ x }}]{% /for %}'''
expected_output = "[single]"
params = {}

[[tests]]
name = "f1_t2_list_default_with_unicode"
description = "List parameter with unicode string defaults renders unicode cleanly"
template = '''
---
params: [items = list(str) := ["日本語", "🚀", "世界"]]
---
> {% for x in items %}{{ x }}_{% /for %}'''
expected_output = "日本語_🚀_世界_"
params = {}

# ============================================================================
# Tier 1: Basic Functionality — F2 in Operator
# ============================================================================

[[tests]]
name = "f2_t1_str_in_list_true"
description = "in operator returns true when string is present in list"
template = '''
---
params: [roles = list(str)]
---
> {% if "admin" in roles %}authorized{% else %}denied{% /if %}'''
expected_output = "authorized"
[tests.params]
roles = ["user", "admin", "moderator"]

[[tests]]
name = "f2_t1_str_in_list_false"
description = "in operator returns false when string is not in list"
template = '''
---
params: [roles = list(str)]
---
> {% if "admin" in roles %}authorized{% else %}denied{% /if %}'''
expected_output = "denied"
[tests.params]
roles = ["user", "guest"]

[[tests]]
name = "f2_t1_str_not_in_list_true"
description = "!(x in y) returns true when string is absent from list"
template = '''
---
params: [roles = list(str)]
---
> {% if !("banned" in roles) %}permitted{% else %}blocked{% /if %}'''
expected_output = "permitted"
[tests.params]
roles = ["user", "member"]

[[tests]]
name = "f2_t1_str_in_str_true"
description = "in operator checks substring presence in string"
template = '''
---
params: [message = str]
---
> {% if "error" in message %}alert{% else %}ok{% /if %}'''
expected_output = "alert"
[tests.params]
message = "a fatal error occurred"

[[tests]]
name = "f2_t1_str_not_in_str_true"
description = "!(x in y) returns true when substring is not in string"
template = '''
---
params: [query = str]
---
> {% if !("drop table" in query) %}safe_query{% else %}dangerous{% /if %}'''
expected_output = "safe_query"
[tests.params]
query = "select * from users where id = 1"

# ============================================================================
# Tier 2: Edge Cases & BVA — F2 in Operator
# ============================================================================

[[tests]]
name = "f2_t2_in_empty_list"
description = "in operator against empty list always returns false"
template = '''
---
params: [items = list(str)]
---
> {% if "target" in items %}found{% else %}missing{% /if %}'''
expected_output = "missing"
[tests.params]
items = []

[[tests]]
name = "f2_t2_not_in_empty_list"
description = "!(x in y) against empty list always returns true"
template = '''
---
params: [items = list(str)]
---
> {% if !("target" in items) %}safe{% else %}found{% /if %}'''
expected_output = "safe"
[tests.params]
items = []

[[tests]]
name = "f2_t2_empty_str_in_str"
description = "empty string is considered present in any string"
template = '''
---
params: [text = str]
---
> {% if "" in text %}contains_empty{% else %}no{% /if %}'''
expected_output = "contains_empty"
[tests.params]
text = "hello"

[[tests]]
name = "f2_t2_int_in_int_list"
description = "in operator checks integer presence in list of integers"
template = '''
---
params: [nums = list(int)]
---
> {% if 0 in nums %}zero_present{% else %}no_zero{% /if %}'''
expected_output = "zero_present"
[tests.params]
nums = [-5, 0, 10]

[[tests]]
name = "f2_t2_unicode_substring_in_str"
description = "in operator correctly matches unicode substrings"
template = '''
---
params: [text = str]
---
> {% if "日本" in text %}match_found{% else %}no_match{% /if %}'''
expected_output = "match_found"
[tests.params]
text = "こんにちは日本語テスト"

