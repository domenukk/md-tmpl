[[tests]]
name = "f_t4_prompt_builder_valid_default"
description = "Real-World S5: Automated prompt builder with default tools list and validation passing"
template = '''
---
params:
  - model = str
  - system_prompt = str
  - tools = list(str) := ["code_search", "view_file"]
