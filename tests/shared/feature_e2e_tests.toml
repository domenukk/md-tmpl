# ============================================================================
# F7: Option Types — None/Some Convention
#
# TOML has no null. The shared test runners use this convention:
#   - String "None"    → Value::None (null)
#   - String "Some(x)" → Value::Str(x)  (escapes the literal string "None")
#   - Omitted key      → parameter not provided (uses default if declared)
#   - Any other value   → normal (transparent Some for option types)
# ============================================================================

# -- Option + For loop interaction --

