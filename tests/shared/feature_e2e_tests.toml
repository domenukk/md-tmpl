[[tests]]
name = "f3_t1_unclosed_if_tag"
description = "Unclosed if tag produces syntax error diagnostic with unclosed message"
template = '''
---
params: [flag = bool]
---
> {% if flag %}yes'''
expected_error = "unclosed"
[tests.params]
flag = true

[[tests]]
name = "f3_t1_unclosed_for_tag"
description = "Unclosed for tag produces syntax error diagnostic"
template = '''
---
params: [items = list(str)]
---
> {% for x in items %}{{ x }}'''
expected_error = "unclosed"
[tests.params]
items = ["a"]

[[tests]]
name = "f3_t1_unclosed_expr_tag"
description = "Unclosed expression tag produces syntax error diagnostic"
template = '''
---
params: [name = str]
---
Hello {{ name'''
expected_error = "unclosed"
params = {}

[[tests]]
name = "f3_t1_unknown_statement"
description = "Malformed statement tag produces syntax error diagnostic"
template = '''
---
params: []
---
> {% for item in %}'''
expected_error = "for"
params = {}

[[tests]]
name = "f3_t1_unknown_filter"
description = "Unknown filter produces syntax error diagnostic"
template = '''
---
params: [name = str]
---
{{ name | nonexistent_filter }}'''
expected_error = "unknown filter"
[tests.params]
name = "test"

