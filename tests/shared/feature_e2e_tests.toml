[[tests]]
name = "f_t4_prompt_builder_injection_panic"
description = "Real-World S5: Automated prompt builder halts rendering on system prompt injection pattern"
template = '''
---
params:
  - model = str
  - system_prompt = str
  - tools = list(str) := ["code_search", "view_file"]
---
> {% if !("gemini" in model) %}{% panic("Unsupported model selected") %}{% /if %}
