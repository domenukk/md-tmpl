# ============================================================================
# Tier 1: Basic Functionality — F4 {% panic(...) %} Statement
# ============================================================================

[[tests]]
name = "f4_t1_panic_simple_string"
description = "panic statement halts rendering with template panic message"
template = '''
---
params: []
---
> {% panic("something went wrong") %}'''
expected_error = "template panic: something went wrong"
params = {}

[[tests]]
name = "f4_t1_panic_with_variable"
description = "panic statement can take a variable as argument"
template = '''
---
params: [err_msg = str]
---
> {% panic(err_msg) %}'''
expected_error = "custom error from var"
[tests.params]
err_msg = "custom error from var"

[[tests]]
name = "f4_t1_panic_inside_if_branch_taken"
description = "panic inside an active if branch halts rendering"
template = '''
---
params: [flag = bool]
---
> {% if flag %}{% panic("flag was true") %}{% /if %}'''
expected_error = "flag was true"
[tests.params]
flag = true

[[tests]]
name = "f4_t1_panic_inside_if_branch_skipped"
description = "panic inside a skipped if branch is ignored"
template = '''
---
params: [flag = bool]
---
> {% if flag %}{% panic("should not panic") %}{% else %}ok{% /if %}'''
expected_output = "ok"
[tests.params]
flag = false

[[tests]]
name = "f4_t1_panic_inside_for_loop"
description = "panic inside a for loop halts rendering when triggered"
template = '''
---
params: [items = list(str)]
---
> {% for x in items %}{% if x == "bad" %}{% panic("bad item found") %}{% /if %}{{ x }}{% /for %}'''
expected_error = "bad item found"
[tests.params]
items = ["good", "bad", "ok"]

# ============================================================================
# Tier 2: Edge Cases & BVA — F4 {% panic(...) %} Statement
# ============================================================================

[[tests]]
name = "f4_t2_panic_empty_string"
description = "panic statement with empty string argument produces template panic prefix"
template = '''
---
params: []
---
> {% panic("") %}'''
expected_error = "template panic:"
params = {}

[[tests]]
name = "f4_t2_panic_missing_args"
description = "panic statement without parentheses or argument produces error"
template = '''
---
params: []
---
> {% panic %}'''
expected_error = "panic"
params = {}

[[tests]]
name = "f4_t2_panic_unclosed_parens"
description = "panic statement with empty parens produces syntax error"
template = '''
---
params: []
---
> {% panic() %}'''
expected_error = "panic"
params = {}

[[tests]]
name = "f4_t2_panic_in_else_branch_taken"
description = "panic in else branch triggers when condition is false"
template = '''
---
params: [flag = bool]
---
> {% if flag %}ok{% else %}{% panic("fallback failed") %}{% /if %}'''
expected_error = "fallback failed"
[tests.params]
flag = false

[[tests]]
name = "f4_t2_panic_with_unicode_msg"
description = "panic statement correctly propagates unicode error messages"
template = '''
---
params: []
---
> {% panic("致命的なエラー 🚨") %}'''
expected_error = "致命的なエラー 🚨"
params = {}

[[tests]]
name = "f4_t2_panic_string_interpolation"
description = "panic string literal supports {{ expr }} interpolation inside the message"
template = '''
---
params: [role = str]
---
> {% panic("unsupported role: {{ role }}") %}'''
expected_error = "unsupported role: superuser"
[tests.params]
role = "superuser"

[[tests]]
name = "f4_t2_panic_string_interpolation_multiple"
description = "panic string literal with multiple interpolation expressions"
template = '''
---
params: [action = str, target = str]
---
> {% panic("forbidden: {{ action }} on {{ target }}") %}'''
expected_error = "forbidden: delete on production"
[tests.params]
action = "delete"
target = "production"

# ============================================================================
# Tier 3: Pairwise Coverage Across Features
# ============================================================================

[[tests]]
name = "f_t3_list_default_and_in_operator_used"
description = "Pairwise: default list parameter evaluated with in operator (default used)"
template = '''
---
params: [items = list(str) := ["allowed", "public"]]
---
> {% if "admin" in items %}yes{% else %}no{% /if %}'''
expected_output = "no"
params = {}

[[tests]]
name = "f_t3_list_default_and_in_operator_overridden"
description = "Pairwise: default list parameter evaluated with in operator (overridden)"
template = '''
---
params: [items = list(str) := ["allowed", "public"]]
---
> {% if "admin" in items %}yes{% else %}no{% /if %}'''
expected_output = "yes"
[tests.params]
items = ["admin", "root"]

[[tests]]
name = "f_t3_list_default_and_not_in_operator_used"
description = "Pairwise: default list parameter evaluated with !(x in y) (default used)"
template = '''
---
params: [items = list(str) := ["banned"]]
---
> {% if !("user" in items) %}welcome{% else %}rejected{% /if %}'''
expected_output = "welcome"
params = {}

[[tests]]
name = "f_t3_list_default_and_not_in_operator_overridden"
description = "Pairwise: default list parameter evaluated with !(x in y) (overridden)"
template = '''
---
params: [items = list(str) := ["banned"]]
---
> {% if !("user" in items) %}welcome{% else %}rejected{% /if %}'''
expected_output = "rejected"
[tests.params]
items = ["user"]

[[tests]]
name = "f_t3_in_operator_triggering_panic"
description = "Pairwise: in operator match triggering panic statement"
template = '''
---
params: [query_tags = list(str)]
---
> {% if "malicious" in query_tags %}{% panic("security violation") %}{% else %}clean{% /if %}'''
expected_error = "security violation"
[tests.params]
query_tags = ["malicious", "test"]

[[tests]]
name = "f_t3_not_in_operator_triggering_panic"
description = "Pairwise: !(x in y) condition triggering panic statement"
template = '''
---
params: [headers = list(str)]
---
> {% if !("auth_token" in headers) %}{% panic("missing auth token") %}{% else %}authenticated{% /if %}'''
expected_error = "missing auth token"
[tests.params]
headers = ["content_type"]

[[tests]]
name = "f_t3_list_default_with_panic_on_default"
description = "Pairwise: list parameter default causing conditional panic"
template = '''
---
params: [methods = list(str) := ["DEPRECATED"]]
---
> {% if "DEPRECATED" in methods %}{% panic("using deprecated default method") %}{% /if %}'''
expected_error = "using deprecated default method"
params = {}

[[tests]]
name = "f_t3_list_default_with_panic_overridden_safe"
description = "Pairwise: list parameter default override avoiding conditional panic"
template = '''
---
params: [methods = list(str) := ["DEPRECATED"]]
---
> {% if "DEPRECATED" in methods %}{% panic("using deprecated default method") %}{% else %}safe_method{% /if %}'''
expected_output = "safe_method"
[tests.params]
methods = ["V2_SECURE"]

[[tests]]
name = "f_t3_nested_if_in_and_not_in"
description = "Pairwise: nested if/else blocks combining in and !(x in y) operators"
template = '''
---
params:
  - roles = list(str)
  - tags = list(str)
---
> {% if "admin" in roles %}{% if !("blocked" in tags) %}access_granted{% else %}blocked_admin{% /if %}{% else %}not_admin{% /if %}'''
expected_output = "blocked_admin"
[tests.params]
roles = ["admin"]
tags = ["blocked"]

[[tests]]
name = "f_t3_int_list_default_with_in_operator"
description = "Pairwise: integer list default evaluated with in membership operator"
template = '''
---
params: [ports = list(int) := [80, 443]]
---
> {% if 8080 in ports %}custom_port{% else %}standard_port{% /if %}'''
expected_output = "standard_port"
params = {}

# ============================================================================
# Tier 4: Real-World Application Scenarios
# ============================================================================

[[tests]]
name = "f_t4_rbac_access_control_default"
description = "Real-World S1: RBAC access control using default allowed_roles list (access granted)"
template = '''
---
params:
  - user_role = str
  - allowed_roles = list(str) := ["admin", "auditor"]
---
> {% if user_role in allowed_roles %}ACCESS GRANTED: {{ user_role }}{% else %}ACCESS DENIED: {{ user_role }}{% /if %}'''
expected_output = "ACCESS GRANTED: auditor"
[tests.params]
user_role = "auditor"

[[tests]]
name = "f_t4_rbac_access_control_overridden_denied"
description = "Real-World S1: RBAC access control with overridden roles (access denied)"
template = '''
---
params:
  - user_role = str
  - allowed_roles = list(str) := ["admin", "auditor"]
---
> {% if user_role in allowed_roles %}ACCESS GRANTED: {{ user_role }}{% else %}ACCESS DENIED: {{ user_role }}{% /if %}'''
expected_output = "ACCESS DENIED: guest"
[tests.params]
user_role = "guest"
allowed_roles = ["admin", "superuser"]

[[tests]]
name = "f_t4_sql_generator_injection_panic"
description = "Real-World S2: Dynamic SQL generator triggers panic on semicolon injection pattern"
template = '''
---
params: [table_name = str]
---
> {% if ";" in table_name %}{% panic("SQL injection pattern detected") %}{% elif "--" in table_name %}{% panic("SQL injection pattern detected") %}{% else %}SELECT * FROM {{ table_name }};{% /if %}'''
expected_error = "SQL injection pattern detected"
[tests.params]
table_name = "users; DROP TABLE users"

[[tests]]
name = "f_t4_sql_generator_safe_query"
description = "Real-World S2: Dynamic SQL generator outputs query when input is clean"
template = '''
---
params: [table_name = str]
---
> {% if ";" in table_name %}{% panic("SQL injection pattern detected") %}{% elif "--" in table_name %}{% panic("SQL injection pattern detected") %}{% else %}SELECT * FROM {{ table_name }};{% /if %}'''
expected_output = "SELECT * FROM orders;"
[tests.params]
table_name = "orders"

[[tests]]
name = "f_t4_diagnostic_unclosed_if"
description = "Real-World S3: Diagnostic reporter verifies line number on unclosed if block"
template = '''
---
params: [flag = bool]
---
Header line

> {% if flag %}

Missing close tag'''
expected_error = "line"
[tests.params]
flag = true

[[tests]]
name = "f_t4_diagnostic_missing_panic_arg"
description = "Real-World S3: Diagnostic reporter verifies error on malformed panic statement"
template = '''
---
params: []
---
Line 1

> {% panic %}

Line 3'''
expected_error = "panic"
params = {}

[[tests]]
name = "f_t4_email_notification_default_tier"
description = "Real-World S4: Multi-recipient email using default tiers includes general updates and unsub link"
template = '''
---
params:
  - recipient = str
  - tiers = list(str) := ["general", "updates"]
