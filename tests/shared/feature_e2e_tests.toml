> {% match x %}{% case X %}x{% case Y %}y{% /match %}'''
expected_error = "reserved keyword used as name: 'enum'|shadows built-in type name: 'enum'"

[[tests]]
name = "reserved_param_name_option"
description = "param named 'option' is rejected — built-in type name"
template = '''
---
params: [option = str]
---
{{ option }}'''
expected_error = "reserved keyword used as name: 'option'"

# ============================================================================
# Language Keyword Compatibility
# ============================================================================
# Verifies that target-language keywords (e.g. Rust's `type`, `match`, `loop`,
# or TypeScript's `class`, `delete`) work as param/field names at the runtime
# level.  The md-tmpl engine treats these as plain identifiers; only the Rust
# proc-macro codegen needs raw identifiers (`r#type`), handled transparently.

[[tests]]
name = "language_keyword_param_type"
description = "Param named 'type' (Rust keyword) works at runtime"
template = '''
---
params: [type = str]
---
{{ type }}'''
expected_output = "widget"
[tests.params]
type = "widget"

[[tests]]
name = "language_keyword_param_match"
description = "Param named 'match' (Rust keyword) works at runtime"
template = '''
---
params: [match = int]
---
{{ match }}'''
expected_output = "42"
[tests.params]
match = 42

[[tests]]
name = "language_keyword_param_class"
description = "Param named 'class' (JS/TS keyword) works at runtime"
template = '''
---
params: [class = str]
---
{{ class }}'''
expected_output = "primary"
[tests.params]
class = "primary"

[[tests]]
name = "language_keyword_param_delete"
description = "Param named 'delete' (JS keyword) works at runtime"
template = '''
---
params: [delete = bool]
---
{{ delete }}'''
expected_output = "true"
[tests.params]
delete = true

[[tests]]
name = "language_keyword_struct_field_type"
description = "Struct field named 'type' works at runtime"
template = '''
---
params: [item = struct(type = str, value = int)]
---
{{ item.type }}={{ item.value }}'''
expected_output = "widget=42"
[tests.params.item]
type = "widget"
value = 42

[[tests]]
name = "language_keyword_list_field_type"
description = "List item field named 'type' works at runtime"
template = '''
---
params: [items = list(type = str)]
---
> {% for x in items %}{{ x.type }} {% /for %}'''
expected_output = "a b "
[[tests.params.items]]
type = "a"
[[tests.params.items]]
type = "b"

[[tests]]
name = "language_keyword_in_if_condition"
description = "Keyword param used in if condition"
template = '''
---
params: [loop = bool]
---
> {% if loop %}yes{% else %}no{% /if %}'''
expected_output = "yes"
[tests.params]
loop = true

[[tests]]
name = "language_keyword_multiple_params"
description = "Multiple keyword params in one template"
template = '''
---
params:
  - type = str
  - match = int
  - loop = bool
---
{{ type }}: {{ match }}
> {% if loop %}(looping){% /if %}'''
expected_output = "widget: 42\n(looping)"
[tests.params]
type = "widget"
match = 42
loop = true

