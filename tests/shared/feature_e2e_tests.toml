# ============================================================================
# Frontmatter Formatting: Blank Line After Block List
# ============================================================================
# SPEC rule: A block list (imports:, types:, consts:, params:, env:) must be
# followed by a blank line before the next section keyword. This ensures raw
# markdown renderers don't merge the list with the following key.

[[tests]]
name = "fm_blank_line_imports_before_params_reject"
description = "Missing blank line after imports: block list before params: is rejected"
template = '''
---
imports:
  - "[shared](./shared.tmpl.md)"
params:
  - x = int
---
body'''
expected_error = "blank line is required after a block list"

[[tests]]
name = "fm_blank_line_consts_before_params_reject"
description = "Missing blank line after consts: block list before params: is rejected"
template = '''
---
consts:
  - FOO = str := "bar"
params:
  - x = int
---
body'''
expected_error = "blank line is required after a block list"

[[tests]]
name = "fm_blank_line_types_before_consts_reject"
description = "Missing blank line after types: block list before consts: is rejected"
template = '''
---
types:
  - Severity = enum(Low, Medium, High)
consts:
  - FOO = str := "bar"
---
body'''
expected_error = "blank line is required after a block list"

[[tests]]
name = "fm_blank_line_consts_before_allow_unused_reject"
description = "Missing blank line after consts: block list before allow_unused: is rejected"
template = '''
---
consts:
  - FOO = str := "bar"
allow_unused: true
---
body'''
expected_error = "blank line is required after a block list"

[[tests]]
name = "fm_blank_line_env_before_params_reject"
description = "Missing blank line after env: block list before params: is rejected"
template = '''
---
env:
  - DIR = str
params:
  - x = int
---
body'''
expected_error = "blank line is required after a block list"

[[tests]]
name = "fm_blank_line_params_before_allow_unused_reject"
description = "Missing blank line after params: block list before allow_unused: is rejected"
template = '''
---
params:
  - x = str
allow_unused: true
---
{{ x }}'''
expected_error = "blank line is required after a block list"

[[tests]]
name = "fm_blank_line_present_consts_before_params_accept"
description = "Blank line after consts: block list before params: is accepted"
template = '''
---
consts:
  - FOO = str := "bar"

params:
  - x = str
---
{{ FOO }}: {{ x }}'''
expected_output = "bar: hello"
[tests.params]
x = "hello"

[[tests]]
name = "fm_blank_line_inline_list_no_blank_line_ok"
description = "Inline list format (params: [...]) followed by another key without blank line is accepted"
template = '''
---
params: [x = str]
---
{{ x }}'''
expected_output = "hi"
[tests.params]
x = "hi"

