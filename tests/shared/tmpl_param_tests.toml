[[tests]]
name = "tmpl_param_basic_include"
description = "tmpl() param can be included with parameters"
template = '''
---
params: [name = str]
---
> {% tmpl greeting %}
---
params: [name = str]
---
Hello {{ name }}!

> {% /tmpl %}

> {% include greeting with name=name %}'''
expected_output = '''
Hello World!
'''

[tests.params]
name = "World"

[[tests]]
name = "tmpl_param_multiple_params"
description = "Inline template with multiple typed parameters (str + int)"
template = '''
---
params:
  - label = str
  - count = int
---
> {% tmpl widget %}
---
params:
  - label = str
  - count = int
---
{{ label }}: {{ count }}

> {% /tmpl %}

> {% include widget with label=label, count=count %}'''
expected_output = '''
items: 7
'''

[tests.params]
label = "items"
count = 7

[[tests]]
name = "tmpl_param_type_mismatch_str_for_int"
description = "Passing str where int is expected produces a type mismatch error"
template = '''
---
params: [name = str]
---
> {% tmpl counter %}
---
params: [count = int]
---
{{ count }}

> {% /tmpl %}

> {% include counter with count=name %}'''
expected_error = "type mismatch"

[tests.params]
name = "oops"

[[tests]]
name = "tmpl_param_with_defaults"
description = "Inline template with default param values uses defaults when not overridden"
template = '''
---
params: [name = str]
---
> {% tmpl greeter %}
---
params:
  - name = str
  - greeting = str := "Hi"
---
{{ greeting }} {{ name }}!

> {% /tmpl %}

> {% include greeter with name=name %}'''
expected_output = '''
Hi World!
'''

[tests.params]
name = "World"

[[tests]]
name = "tmpl_param_override_default"
description = "Explicitly passed value overrides the default"
template = '''
---
params:
  - name = str
  - greeting = str
---
> {% tmpl greeter %}
---
params:
  - name = str
  - greeting = str := "Hi"
---
{{ greeting }} {{ name }}!

> {% /tmpl %}

> {% include greeter with name=name, greeting=greeting %}'''
expected_output = '''
Hey World!
'''

[tests.params]
name = "World"
greeting = "Hey"

[[tests]]
name = "tmpl_param_empty_no_params"
description = "Zero-param inline template works with bare include"
template = '''
---
params: []
---
> {% tmpl preamble %}
---
params: []
---
Static content.

> {% /tmpl %}

> {% include preamble %}'''
expected_output = '''
Static content.
'''
params = {}

[[tests]]
name = "tmpl_param_missing_required_param"
description = "Including a template without required params produces an error"
template = '''
---
params: []
---
> {% tmpl needs_stuff %}
---
params:
  - title = str
  - count = int
---
{{ title }} ({{ count }})

> {% /tmpl %}

> {% include needs_stuff %}'''
expected_error = "title"
params = {}

[[tests]]
name = "tmpl_param_nested_includes"
description = "Inline templates can include other inline templates"
template = '''
---
params: [name = str]
---
> {% tmpl inner %}
---
params: [val = str]
---
[{{ val }}]

> {% /tmpl %}

> {% tmpl outer %}
---
params: [name = str]
---

> {% include inner with val=name %}

> {% /tmpl %}

> {% include outer with name=name %}'''
expected_output = '''
[deep]
'''

[tests.params]
name = "deep"

[[tests]]
name = "tmpl_param_enum_in_inline"
description = "Inline template receives an enum-typed param and matches on it"
template = '''
---
types:
  - Status = enum(Active, Paused)

params: [s = Status]
---

> {% tmpl badge %}
---
params: [status = Status]
---
> {% match status %}{% case Active %}🟢{% case Paused %}⏸️{% /match %}

> {% /tmpl %}

> {% include badge with status=s %}'''
expected_output = '🟢'

[tests.params.s]
__kind__ = "Active"

[[tests]]
name = "tmpl_param_for_loop_include"
description = "Inline template included inside a for-loop"
template = '''
---
params:
  - items = list(name = str)
---

> {% tmpl row %}
---
params: [name = str]
---
- {{ name }}

> {% /tmpl %}

> {% for item in items %}
> {% include row with name=item.name %}
> {% /for %}'''
expected_output = '''
- alpha
- beta
'''

[tests.params]
items = [{ name = "alpha" }, { name = "beta" }]

[[tests]]
name = "tmpl_param_bool_int_params"
description = "Inline template with bool and int params"
template = '''
---
params:
  - flag = bool
  - count = int
---

> {% tmpl display %}
---
params:
  - flag = bool
  - count = int
---
> {% if flag %}count={{ count }}{% else %}off{% /if %}

> {% /tmpl %}

> {% include display with flag=flag, count=count %}'''
expected_output = 'count=42'

[tests.params]
flag = true
count = 42

[[tests]]
name = "tmpl_param_nested_tmpl_calling_tmpl"
description = "Inline template that includes another inline template (two-level nesting)"
template = '''
---
params: [msg = str]
---

> {% tmpl leaf %}
---
params: [text = str]
---
[{{ text }}]

> {% /tmpl %}

> {% tmpl wrapper %}
---
params: [content = str]
---

> {% include leaf with text=content %}

> {% /tmpl %}

> {% include wrapper with content=msg %}'''
expected_output = '''
[hello]
'''

[tests.params]
msg = "hello"

[[tests]]
name = "tmpl_param_option_param"
description = "Inline template with an option param — Some case"
template = '''
---
params: [label = option(str)]
---

> {% tmpl show_label %}
---
params: [label = option(str)]
---
> {% match label %}{% case Some %}{{ label }}{% case None %}n/a{% /match %}

> {% /tmpl %}

> {% include show_label with label=label %}'''
expected_output = 'hello'

[tests.params]
label = "hello"

[[tests]]
name = "tmpl_param_option_param_none"
description = "Inline template with an option param — None case"
template = '''
---
params: [label = option(str) := None]
---

> {% tmpl show_label %}
---
params: [label = option(str)]
---
> {% match label %}{% case Some %}{{ label }}{% case None %}n/a{% /match %}

> {% /tmpl %}

> {% include show_label with label=label %}'''
expected_output = 'n/a'
params = {}

[[tests]]
name = "tmpl_param_float_default"
description = "Inline template with float param using default value"
template = '''
---
params: []
---

> {% tmpl scorer %}
---
params: [score = float := 0.95]
---
score={{ score }}

> {% /tmpl %}

> {% include scorer %}'''
expected_output = '''
score=0.95
'''
params = {}

[[tests]]
name = "tmpl_param_multiple_inline_templates"
description = "Multiple inline templates in the same file, each independently included"
template = '''
---
params:
  - name = str
  - count = int
---

> {% tmpl greet %}
---
params: [name = str]
---
Hello {{ name }}!

> {% /tmpl %}

> {% tmpl counter %}
---
params: [count = int]
---
Count: {{ count }}

> {% /tmpl %}

> {% include greet with name=name %}
> {% include counter with count=count %}'''
expected_output = '''
Hello World!
Count: 5
'''

[tests.params]
name = "World"
count = 5

[[tests]]
name = "tmpl_param_struct_param"
description = "Inline template receives a struct-typed param"
template = '''
---
params: [pos = struct(x = int, y = int)]
---

> {% tmpl display_pos %}
---
params: [pos = struct(x = int, y = int)]
---
({{ pos.x }}, {{ pos.y }})

> {% /tmpl %}

> {% include display_pos with pos=pos %}'''
expected_output = '''
(10, 20)
'''

[tests.params.pos]
x = 10
y = 20

[[tests]]
name = "empty_frontmatter_block"
description = "A present but empty frontmatter block declares an empty interface"
template = '''
---
---
# Plain body'''
expected_output = "# Plain body"
params = {}
