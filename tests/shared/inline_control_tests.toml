[[tests]]
name = "in_operator_list_element_unmatched"
description = "In operator on lists evaluates to false when element is absent"
template = '''
---
params: [roles = list(str)]
---
> {% if "guest" in roles %}yes{% else %}no{% /if %}'''
expected_output = "no"

[tests.params]
roles = ["admin", "user"]

[[tests]]
name = "not_in_operator_list_element_matched"
description = "!(x in y) on lists evaluates to true when element is absent"
template = '''
---
params: [roles = list(str)]
---
> {% if !("guest" in roles) %}yes{% else %}no{% /if %}'''
expected_output = "yes"

[tests.params]
roles = ["admin", "user"]

[[tests]]
name = "not_in_operator_list_element_unmatched"
description = "!(x in y) on lists evaluates to false when element is present"
template = '''
---
params: [roles = list(str)]
---
> {% if !("admin" in roles) %}yes{% else %}no{% /if %}'''
expected_output = "no"

[tests.params]
roles = ["admin", "user"]

[[tests]]
name = "match_non_exhaustive_suggests_combined_arm"
description = "Non-exhaustive match on enum with multiple missing variants suggests combined pipe case arm"
template = '''
---
types:
  - Outcome = enum(Confirmed, Rejected, Pending, Reviewing)

params: [res = Outcome]
---
> {% match res %}
> {% case Confirmed %}ok
> {% case Rejected %}no
> {% /match %}'''
expected_error = "or combined arm: {% case Pending | Reviewing %}"

[tests.params]
res = "Confirmed"
