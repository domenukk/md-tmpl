# ---------------------------------------------------------------------------
# Whitespace trim modifier tests
# ---------------------------------------------------------------------------

[[tests]]
name = "trim_expr_left"
description = "Left trim {{- strips whitespace before the expression"
template = '''
---
params: [n = str]
---
hello  {{- n }} bye'''
expected_output = "helloW bye"

[tests.params]
n = "W"

[[tests]]
name = "trim_expr_right"
description = "Right trim -}} strips whitespace after the expression"
template = '''
---
params: [n = str]
---
hello {{ n -}}  bye'''
expected_output = "hello Wbye"

[tests.params]
n = "W"

[[tests]]
name = "trim_expr_both"
description = "Both trims {{- -}} strip whitespace on both sides"
template = '''
---
params: [n = str]
---
hello  {{- n -}}  bye'''
expected_output = "helloWbye"

[tests.params]
n = "W"

[[tests]]
name = "trim_stmt_for_loop"
description = "Trim modifiers on inline for loop remove surrounding whitespace"
template = '''
---
params: [items = list(str)]
---
[{%- for item in items -%}{{ item }}{%- /for -%}]'''
expected_output = "[abc]"

[tests.params]
items = ["a", "b", "c"]

[[tests]]
name = "trim_stmt_if_else"
description = "Trim modifiers on inline if-else remove surrounding whitespace"
template = '''
---
params: [flag = bool]
---
X{%- if flag -%}Y{%- else -%}N{%- /if -%}Z'''
expected_output = "XYZ"

[tests.params]
flag = true

[[tests]]
name = "trim_stmt_if_else_false"
description = "Trim modifiers on inline if-else — false branch"
template = '''
---
params: [flag = bool]
---
X{%- if flag -%}Y{%- else -%}N{%- /if -%}Z'''
expected_output = "XNZ"

[tests.params]
flag = false

[[tests]]
name = "trim_comment_inline"
description = "Trim modifiers on inline comments remove surrounding whitespace"
template = '''
---
params: [x = str]
---
before  {#- this is trimmed -#}  after {{ x }}'''
expected_output = "beforeafter 1"

[tests.params]
x = "1"

[[tests]]
name = "trim_comment_left_only"
description = "Left trim on comment only strips before"
template = '''
---
params: [x = str]
---
hello  {#- note #}  world {{ x }}'''
expected_output = "hello  world 1"

[tests.params]
x = "1"

[[tests]]
name = "trim_comment_right_only"
description = "Right trim on comment only strips after"
template = '''
---
params: [x = str]
---
hello  {# note -#}  world {{ x }}'''
expected_output = "hello  world 1"

[tests.params]
x = "1"

