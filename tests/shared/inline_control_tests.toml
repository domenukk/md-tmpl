[[tests]]
name = "const_str_as_param_default"
description = "String const used as param default resolves to const value"
template = '''
---
consts:
  - GREETING = str := "Hello"

params:
  - msg = str := GREETING
---
{{ msg }}'''
expected_output = "Hello"
params = {}

[[tests]]
name = "const_str_default_overridden"
description = "String const default can be overridden by caller"
template = '''
---
consts:
  - GREETING = str := "Hello"

params:
  - msg = str := GREETING
---
{{ msg }}'''
expected_output = "Hi"

[tests.params]
msg = "Hi"

[[tests]]
name = "const_bool_as_param_default"
description = "Bool const used as param default resolves to const value"
template = '''
---
consts:
  - DEFAULT_FLAG = bool := true

params:
  - flag = bool := DEFAULT_FLAG
---
> {% if flag %}yes{% else %}no{% /if %}'''
expected_output = "yes"
params = {}

[[tests]]
name = "const_bool_default_overridden"
description = "Bool const default can be overridden by caller"
template = '''
---
consts:
  - DEFAULT_FLAG = bool := true

params:
  - flag = bool := DEFAULT_FLAG
---
> {% if flag %}yes{% else %}no{% /if %}'''
expected_output = "no"

[tests.params]
flag = false

[[tests]]
name = "empty_inline_if_true"
description = "Empty inline if body — true condition renders nothing extra"
template = '''
---
params: [flag = bool]
---
before{% if flag %}{% /if %}after'''
expected_output = "beforeafter"

[tests.params]
flag = true

[[tests]]
name = "empty_inline_if_false"
description = "Empty inline if body — false condition also renders nothing"
template = '''
---
params: [flag = bool]
---
before{% if flag %}{% /if %}after'''
expected_output = "beforeafter"

[tests.params]
flag = false

[[tests]]
name = "for_loop_concat"
description = "Inline for loop concatenates items without separator"
template = '''
---
params: [items = list(str)]
---
> {% for item in items %}{{ item }}{% /for %}'''
expected_output = "xyz"

[tests.params]
items = ["x", "y", "z"]

[[tests]]
name = "inline_tmpl_own_consts"
description = "Inline template with its own consts renders them correctly"
template = '''
---
params: []
---
> {% tmpl versioned %}
---
consts:
  - V = str := "2.0"

params: []
---
v{{ V }}

> {% /tmpl %}

> {% include versioned %}'''
expected_output = '''
v2.0
'''
params = {}

[[tests]]
name = "join_filter_on_list"
description = "Join filter concatenates list items with separator"
template = '''
---
params: [tags = list(str)]
---
[{{ tags | join(", ") }}]'''
expected_output = "[rust, ts, go]"

[tests.params]
tags = ["rust", "ts", "go"]

[[tests]]
name = "control_deeply_nested_struct_in_loop"
description = "For loop accessing deeply nested struct fields across lists"
template = '''
---
params: [org = struct(name = str, teams = list(name = str, members = list(name = str, role = str)))]
---
{{ org.name }}:

> {% for team in org.teams %}

Team {{ team.name }}:

> {% for member in team.members %}

- {{ member.name }} ({{ member.role }})

> {% /for %}

> {% /for %}'''
expected_output = '''
Eng:
Team Core:
- Alice (Lead)
- Bob (Dev)
'''

[tests.params]
org = { "name" = "Eng", "teams" = [
  { "name" = "Core", "members" = [
    { "name" = "Alice", "role" = "Lead" },
    { "name" = "Bob", "role" = "Dev" },
  ] },
] }

[[tests]]
name = "control_whitespace_stripping_loop_if"
description = "Aggressive whitespace stripping in combined for and if blocks"
template = '''
---
params: [nums = list(int)]
---
[X{%- for n in nums -%}{%- if n > 0 -%}{{ n }}{%- /if -%}{%- /for -%}Y]'''
expected_output = "[X24Y]"

[tests.params]
nums = [-1, 2, -3, 4]

[[tests]]
name = "control_match_option_narrowing_complex"
description = "Match statement on option<struct<...>> narrowing fields"
template = '''
---
params: [config = option(struct(host = str, port = int))]
---
> {% match config %}

> {% case Some %}

{{ config.host }}:{{ config.port }}

> {% case None %}

default:80

> {% /match %}'''
expected_output = '''
localhost:8080
'''

[tests.params]
config = { "host" = "localhost", "port" = 8080 }

[[tests]]
name = "in_operator_string_substring_matched"
description = "In operator on strings evaluates to true when substring is present"
template = '''
---
params: [text = str]
---
> {% if "bar" in text %}yes{% else %}no{% /if %}'''
expected_output = "yes"

[tests.params]
text = "foobar"

[[tests]]
name = "in_operator_string_substring_unmatched"
description = "In operator on strings evaluates to false when substring is absent"
template = '''
---
params: [text = str]
---
> {% if "baz" in text %}yes{% else %}no{% /if %}'''
expected_output = "no"

[tests.params]
text = "foobar"

[[tests]]
name = "not_in_operator_string_substring_matched"
description = "!(x in y) on strings evaluates to true when substring is absent"
template = '''
---
params: [text = str]
---
> {% if !("baz" in text) %}yes{% else %}no{% /if %}'''
expected_output = "yes"

[tests.params]
text = "foobar"

[[tests]]
name = "not_in_operator_string_substring_unmatched"
description = "!(x in y) on strings evaluates to false when substring is present"
template = '''
---
params: [text = str]
---
> {% if !("bar" in text) %}yes{% else %}no{% /if %}'''
expected_output = "no"

[tests.params]
text = "foobar"

[[tests]]
name = "in_operator_list_element_matched"
