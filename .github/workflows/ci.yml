name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Test (Rust ${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --exclude prompt-templates-macros --all-features -- -D warnings
      - run: cargo clippy -p prompt-templates-macros --all-targets -- -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt -- --check

  doc:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --all-features --no-deps

  no-std:
    name: no_std
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
      - name: Integration tests (--no-default-features)
        run: cargo test -p prompt-templates --no-default-features --test no_std_compat
      - name: True no_std target (bare)
        run: cargo build -p prompt-templates --no-default-features --target thumbv7em-none-eabihf
      - name: True no_std target (+ serde)
        run: cargo build -p prompt-templates --no-default-features --features serde --target thumbv7em-none-eabihf
      - name: True no_std target (+ typed-builder)
        run: cargo build -p prompt-templates --no-default-features --features typed-builder --target thumbv7em-none-eabihf
      - name: True no_std target (+ serde + typed-builder)
        run: cargo build -p prompt-templates --no-default-features --features serde,typed-builder --target thumbv7em-none-eabihf

  python:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: Swatinem/rust-cache@v2
      - run: python -m venv .venv && . .venv/bin/activate && pip install maturin pytest
      - run: . .venv/bin/activate && cd crates/prompt-templates-python && maturin develop && pytest python/tests/ -v

  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: Swatinem/rust-cache@v2
      - name: Build FFI library
        run: cargo build -p prompt-templates-ffi --release
      - name: Run Go tests
        run: cd go/prompt_templates && go test -v -count=1 ./...

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: cd crates/prompt-templates-typescript && npm install
      - name: Type-check
        run: cd crates/prompt-templates-typescript && npx tsc --noEmit --strict
      - name: Build
        run: cd crates/prompt-templates-typescript && npx tsc
      - name: Run tests
        run: cd crates/prompt-templates-typescript && node --test dist/tests/*.test.js

  wasm:
    name: WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: cargo install wasm-pack
      - name: Build WASM package
        run: cd crates/prompt-templates-wasm && wasm-pack build --target nodejs --out-dir pkg --release
      - name: Install test deps
        run: cd crates/prompt-templates-wasm && npm install
      - name: Run WASM tests
        run: cd crates/prompt-templates-wasm && npx tsc && node dist/correctness.js && node --test dist/wasm.test.js

