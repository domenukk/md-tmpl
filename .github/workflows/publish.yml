name: Publish

on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Rust: publish to crates.io ────────────────────
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Core must be published first (macros depends on it).
      - name: Publish md-tmpl
        run: cargo publish -p md-tmpl --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # crates.io index needs a moment to reflect the new version.
      - name: Wait for index
        run: sleep 30

      - name: Publish md-tmpl-macros
        run: cargo publish -p md-tmpl-macros --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Python: build wheels and publish to PyPI ──────
  publish-python:
    name: Build & Publish Python (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-14
            target: aarch64
          - os: macos-13
            target: x86_64
          - os: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
          working-directory: crates/md-tmpl-python

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: crates/md-tmpl-python/dist

  # ── Publish all wheels to PyPI ────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: publish-python
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # trusted publishing
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # ── TypeScript: publish to npm ─────────────────────
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: cd crates/md-tmpl-typescript && npm install

      - name: Build
        run: cd crates/md-tmpl-typescript && npx tsc

      - name: Publish
        run: cd crates/md-tmpl-typescript && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
